[build]
  command = "npm install && npm --prefix frontend run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["web-push"]

# SPA fallback (Netlify serves functions before this)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
